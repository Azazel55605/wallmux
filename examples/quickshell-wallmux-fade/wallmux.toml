[transitions.effects]
quickshell_overlay = true
quickshell_command = "~/.config/quickshell/wallmux-fade/wallmux-fade.sh {stage} {monitor}"
quickshell_transitions = ["image_to_video", "video_to_image", "video_to_video"]
timeout_seconds = 2.0

# Keep the overlay opaque while mpvpaper creates its layer.
[transitions.basic]
enabled = true
video_start_settle_seconds = 0.8

[transitions.video_bridge]
enabled = true
poster_timestamp_seconds = 0.0
poster_settle_seconds = 0.8
