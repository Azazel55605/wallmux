[general]
wallpaper_dirs = [
  "~/Pictures/Wallpapers",
  "~/Videos/Wallpapers",
]
default_monitor = "all"
restore_on_startup = true
thumbnail_size = 256
all_monitor_mode = "simultaneous"

[backend_rules]
image = "awww"
gif = "awww"
video = "mpvpaper"

[backends.awww]
command = "awww"
transition_type = "grow"
transition_step = 90
transition_duration = 0.8
transition_fps = 60
transition_angle = 45.0
transition_pos = "center"
invert_y = false
transition_bezier = ".54,0,.34,.99"
transition_wave = "20,20"

[backends.swww]
command = "swww"
transition_type = "grow"
transition_step = 90
transition_duration = 0.8
transition_fps = 60
transition_angle = 45.0
transition_pos = "center"
invert_y = false
transition_bezier = ".54,0,.34,.99"
transition_wave = "20,20"

[backends.mpvpaper]
command = "mpvpaper"
options = "no-config no-audio loop hwdec=auto profile=fast video-sync=display-resample interpolation=no scale=bilinear cscale=bilinear dscale=bilinear panscan=1.0 osd-level=0 msg-level=all=no"

[backends.gslapper]
command = "gslapper"

[hooks]
before_set = []
after_set = []
timeout_seconds = 30

[hooks.backends]
awww = true
swww = true
mpvpaper = true
gslapper = true

[autoswitch]
enabled = false
interval_seconds = 300
mode = "random"
target = "all"
monitor = ""

[daemon]
startup_restore_retry_seconds = 5.0

[transitions]
video_stop_timeout_seconds = 2.0
kill_video_on_timeout = true

[transitions.effects]
fade_overlay = false
fade_command = ""
screenshot_bridge = false
screenshot_command = ""
quickshell_overlay = false
quickshell_command = ""
timeout_seconds = 2.0

[colors]
video_color_source = "thumbnail"
